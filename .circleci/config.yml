version: 2.1
jobs:
  build:
    docker:
      - image: cimg/php:7.3-node

      - image: cimg/mysql:5.7
        environment:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: css_testing
          MYSQL_USER: user
          MYSQL_PASSWORD: circleci
      - image: logicalspark/docker-tikaserver

    working_directory: ~/laravel/src/project-css

    steps:
      - checkout:
          path: ~/laravel

      - run:
          name: Copy .env.circleci to .env
          command: cp ~/laravel/env/.env.circleci .env

      - run:
          name: Create exports folder
          command: mkdir -p ~/laravel/src/project-css/storage/app/exports

      - run:
          name: Install PHP extensions
          command: |
            sudo apt-get update
            sudo docker-php-ext-install zip pdo_mysql
            sudo apt-get install -y default-mysql-client

      - run:
          name: Install xdebug (pinned for PHP 7.3)
          command: |
            sudo pecl install xdebug-3.1.6
            echo "zend_extension=$(find /usr/local/lib/php/extensions/ -name xdebug.so)" | sudo tee /usr/local/etc/php/conf.d/xdebug.ini

      - run: sudo composer self-update

      - restore_cache:
          keys:
            - composer-v1-{{ checksum "composer.lock" }}
            - composer-v1-

      - run: composer install -n --prefer-dist

      - save_cache:
          key: composer-v1-{{ checksum "composer.lock" }}
          paths:
            - vendor

      - restore_cache:
          keys:
            - node-v1-{{ checksum "package-lock.json" }}
            - node-v1-

      - run: npm install

      - save_cache:
          key: node-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules

      - run:
          name: Wait for db
          command: dockerize -wait tcp://localhost:3306 -timeout 1m

      - run:
          name: Set the key
          command: php artisan key:generate

      - run:
          name: Reset Cached Config
          command: php artisan config:cache

      - run:
          name: Database Migrate
          command: php artisan migrate --force

      - run:
          name: Run tests
          command: |
            sudo docker-php-ext-enable xdebug
            sudo XDEBUG_MODE=coverage vendor/bin/phpunit --coverage-clover clover.xml

      - run:
          name: Install Qlty
          command: curl https://qlty.sh | sh

      - run:
          name: Upload coverage to Qlty
          command: ~/.qlty/bin/qlty coverage publish clover.xml